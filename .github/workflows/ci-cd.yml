name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  # ----------------------------------------------------------------------------
  # JOB 1: Lint, Test & Build Verification
  # ----------------------------------------------------------------------------
  lint-and-test:
    name: Lint & Test (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [backend, mcp-server, frontend]
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './${{ matrix.service }}/package-lock.json'

      - name: Install Dependencies
        run: |
          cd ${{ matrix.service }}
          npm ci

      - name: Run Linter / Typecheck
        run: |
          cd ${{ matrix.service }}
          npm run lint

      - name: Run Unit Tests
        run: |
          cd ${{ matrix.service }}
          npm run test

      - name: Verify Project Build
        run: |
          cd ${{ matrix.service }}
          npm run build

  # ----------------------------------------------------------------------------
  # JOB 2: Build Docker Images & Push to AWS ECR
  # ----------------------------------------------------------------------------
  build-and-push:
    name: Build & Push Docker Image (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      fail-fast: false
      matrix:
        service: [backend, mcp-server, frontend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.AWS_ECR_REGISTRY }}/smm-${{ matrix.service }}:${{ github.sha }}
            ${{ secrets.AWS_ECR_REGISTRY }}/smm-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------------------
  # JOB 3: Deploy via SSH to AWS EC2
  # ----------------------------------------------------------------------------
  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Deployment Configs to EC2 via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          source: "docker-compose.yml,nginx.conf"
          target: "/home/${{ secrets.EC2_USERNAME }}/app"

      - name: Execute Remote Deployment Commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            cd /home/${{ secrets.EC2_USERNAME }}/app
            
            # Configure local environment
            echo "${{ secrets.ENV_FILE }}" > .env
            
            # Log in to AWS ECR on target host
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.AWS_ECR_REGISTRY }}
            
            # Pull latest containers
            docker compose pull
            
            # Restart modified containers cleanly
            docker compose up -d
            
            # Remove dangling resources to prevent disk exhaustion
            docker image prune -f
