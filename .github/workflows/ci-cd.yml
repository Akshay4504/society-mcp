name: CI Pipeline

on:
push:
branches: [main, master]
pull_request:
branches: [main, master]

jobs:
lint-and-test:
name: Lint & Test (${{ matrix.service }})
runs-on: ubuntu-latest

```
strategy:
  fail-fast: false
  matrix:
    service: [backend, mcp-server, frontend]

steps:
  - uses: actions/checkout@v4

  - uses: actions/setup-node@v4
    with:
      node-version: 20

  - name: Install Dependencies
    run: |
      cd ${{ matrix.service }}
      npm ci

  - name: Lint
    run: |
      cd ${{ matrix.service }}
      npm run lint

  - name: Test
    run: |
      cd ${{ matrix.service }}
      npm run test

  - name: Build
    run: |
      cd ${{ matrix.service }}
      npm run build
```
