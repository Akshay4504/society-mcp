global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "backend"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["backend:5000"]

  - job_name: "mcp-server"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["mcp-server:3001"]
